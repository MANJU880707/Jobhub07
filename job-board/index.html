<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>JobHub Pro</title>

    <link rel="stylesheet" href="style.css">

   <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<body>

<!-- ================= NAVBAR ================= -->

<header class="navbar">

    <div class="logo">
        <i class="fa-solid fa-briefcase"></i>
        <h2>JobHub</h2>
    </div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="categories.html">Categories</a></li>
        <li><a href="candidates.html">Candidates</a></li>
        <li><a href="companies.html">Companies</a></li>
        <li><a href="#">News</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    <div class="nav-btns">
        <button class="login">Login</button>
        <button class="post-job">Post Job</button>
    </div>

</header>

</header>

<!-- ================= HERO ================= -->

<section class="hero">

<div class="hero-left">

<span class="badge">
#1 Trusted Job Portal
</span>

<h1>

Find Your<br>

<span>Dream Job</span><br>

Today

</h1>

<p>

Search thousands of verified jobs from top companies.

</p>

<div class="hero-buttons">

<button class="primary-btn">

Find Jobs

</button>

<button class="secondary-btn">

Post Job

</button>

</div>

</div>

<div class="hero-right">

<img src="image.png">

</div>

</section>

<!-- ================= SEARCH ================= -->

<section class="search-section">

<div class="search-box">

<select>
    <option selected disabled>Select Job Title</option>
    <option>Frontend Developer</option>

    <option>Java Developer</option>
    <option>Python Developer</option>
    <option>UI/UX Designer</option>
    <option>Full Stack Developer</option>
    <option>React Developer</option>
    <option>Node.js Developer</option>
    <option>Data Analyst</option>
    <option>Software Engineer</option>
</select>

<select>
    <option selected disabled>Select Location</option>
    <option>Chennai</option>
    <option>Bangalore</option>
    <option>Hyderabad</option>
    <option>Coimbatore</option>
    <option>Madurai</option>
    <option>Trichy</option>
    <option>Salem</option>
    <option>Erode</option>
    <option>Tirunelveli</option>
    <option>Mumbai</option>
    <option>Delhi</option>
    <option>Kochi</option>
</select>

<select>

<option>

Category

</option>

<option>

Frontend

</option>

<option>

Backend

</option>

<option>

UI / UX

</option>

<option>

Java

</option>

<option>

Python

</option>
</select>
<button>
Search
</button>

</div>

</section>

<script src="script.js"></script>
